<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker Pro</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: #000; color: #fff; font-family: -apple-system, sans-serif; 
      margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
    }
    
    .top-nav {
      flex: 0 0 auto; z-index: 2000;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid #222; padding-top: env(safe-area-inset-top);
    }

    .header-main { padding: 10px; text-align: center; font-size: 13px; color: #00FF9C; text-transform: uppercase; letter-spacing: 1px; }
    .summary-bar { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .menu-btn { background: none; border: none; color: #00FF9C; font-size: 32px; padding: 5px 10px; cursor: pointer; }

    .menu-content { 
      display: none; position: fixed; right: 15px; top: 110px; 
      background: #1a1a1a; border: 1px solid #333; border-radius: 12px; 
      z-index: 9999; width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
    }
    .menu-item { padding: 18px; color: #fff; border-bottom: 1px solid #222; font-weight: 500; text-align: center;}

    .carousel-container {
      flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
      scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
    }
    .carousel-container::-webkit-scrollbar { display: none; }

    .card-wrapper { min-width: 100vw; height: 100%; scroll-snap-align: center; padding: 15px; display: flex; flex-direction: column; }
    .card { 
      background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222;
      flex: 1; display: flex; flex-direction: column; justify-content: space-between;
    }

    .small { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
    .val { color: #00FF9C; font-weight: bold; font-size: 16px; }

    canvas { width: 100% !important; flex: 1; min-height: 180px; max-height: 250px; margin: 10px 0; }

    .input-row { display: flex; gap: 12px; margin-top: 5px; }
    input { 
      flex: 1; min-width: 0; padding: 15px; background: #222; border: 1px solid #333; 
      color: #fff; border-radius: 12px; font-size: 20px; text-align: center; outline: none;
    }
    
    .log-btn { 
      width: 100%; padding: 18px; background: #00FF9C; border: none; border-radius: 12px; 
      font-weight: bold; font-size: 16px; margin-top: 12px; color: #000;
    }

    .dots { 
      flex: 0 0 70px; display: flex; justify-content: center; gap: 8px; 
      padding-top: 15px; background: #000; padding-bottom: env(safe-area-inset-bottom);
    }
    .dot { width: 6px; height: 6px; background: #333; border-radius: 50%; transition: transform 0.2s; }
    .dot.active { background: #00FF9C; transform: scale(1.3); }

    .loading-state { display: flex; align-items: center; justify-content: center; height: 100%; width: 100vw; color: #00FF9C; font-size: 14px; letter-spacing: 2px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="top-nav">
  <div class="header-main" id="dayTitle">Syncing...</div>
  <div class="summary-bar">
    <div><div class="small">Session Volume</div><div id="totalVol" class="val" style="font-size: 20px;">0 lbs</div></div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="text-align: right;"><div class="small">Progress</div><div id="totalDone" class="val">0 / 0</div></div>
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
  </div>
</div>

<div class="menu-content" id="navMenu">
  <div class="menu-item" onclick="handleMenuAction(finishWorkout)">Finish & Switch Day</div>
  <div class="menu-item" onclick="handleMenuAction(() => loadData(true))">Refresh Data</div>
</div>

<div class="carousel-container" id="app">
    <div class="loading-state">Updating...</div>
</div>
<div class="dots" id="dots"></div>

<script>
  function toggleMenu() {
    const m = document.getElementById("navMenu");
    m.style.display = (m.style.display === "block") ? "none" : "block";
  }

  function handleMenuAction(actionFn) {
    toggleMenu();
    actionFn();
  }

  let userKey = localStorage.getItem("workout_key") || prompt("Enter Secret Key:");
  if (userKey) localStorage.setItem("workout_key", userKey);

  const scriptURL = `https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec?key=${userKey}`;

  function loadData(isManualRefresh = false) {
    const app = document.getElementById("app");
    // Capture index before we wipe the UI
    const currentIndex = Math.round(app.scrollLeft / window.innerWidth);
    
    if (isManualRefresh) app.innerHTML = '<div class="loading-state">Fetching Latest...</div>';
    
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("dayTitle").innerText = data.day || "Workout";
        render(data.next || [], currentIndex);
      });
  }

  function render(list, savedIndex = 0) {
    const app = document.getElementById("app");
    const dotsContainer = document.getElementById("dots");
    app.innerHTML = ""; dotsContainer.innerHTML = "";
    
    let vol = 0; let done = 0;
    const today = new Date().toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });

    list.forEach((ex, i) => {
      if (ex.history?.length > 0 && ex.history[ex.history.length-1].d === today) vol += Number(ex.history[ex.history.length-1].v || 0);
      if (ex.setsDone >= 3) done++;

      const wrapper = document.createElement("div");
      wrapper.className = "card-wrapper";
      wrapper.innerHTML = `
        <div class="card">
          <div style="display:flex; justify-content:space-between;">
            <h3 style="margin:0; font-size:22px; line-height:1.2;">${ex.name}</h3>
            <div style="text-align:right;"><div class="small">Goal</div><div class="val">${ex.targetReps}-${ex.repMax}</div></div>
          </div>
          <canvas id="chart-${i}"></canvas>
          <div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <div><div class="small">Suggested</div><div class="val" style="font-size:18px;">${ex.weight} lbs</div></div>
              <div style="text-align:right;"><div class="small">Sets Done</div><div class="val" style="font-size:18px;">${ex.setsDone} / 3</div></div>
            </div>
            ${ex.setsDone < 3 ? `
              <div class="input-row"><input type="number" id="w-${i}" value="${ex.weight}"><input type="number" id="r-${i}" value="${ex.reps}"></div>
              <button class="log-btn" onclick="logSet('${ex.name.replace(/'/g, "\\'")}', ${i}, this)">Log Set</button>
            ` : `<button class="log-btn" disabled style="background:#222; color:#00FF9C; border:1px solid #333;">✓ Complete</button>`}
          </div>
        </div>`;
      app.appendChild(wrapper);
      const d = document.createElement("div"); d.className = "dot"+(i===0?" active":""); dotsContainer.appendChild(d);
      if (ex.history?.length > 0) buildChart(`chart-${i}`, ex.history);
    });

    document.getElementById("totalVol").innerText = vol.toLocaleString() + " lbs";
    document.getElementById("totalDone").innerText = `${done} / ${list.length}`;
    
    // Snaps back to the card you were just looking at
    if (savedIndex > 0) {
        requestAnimationFrame(() => {
            app.scrollTo({ left: savedIndex * window.innerWidth, behavior: 'auto' });
        });
    }

    app.onscroll = () => {
      const idx = Math.round(app.scrollLeft / window.innerWidth);
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    };
  }

  function buildChart(id, history) {
    new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: history.map(h => h.d),
        datasets: [{ 
          data: history.map(h => h.v), borderColor: '#00FF9C', backgroundColor: 'rgba(0, 255, 156, 0.1)', 
          fill: true, tension: 0.4, pointRadius: 5, pointHitRadius: 40 
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, devicePixelRatio: 2,
        layout: { padding: { top: 40 } },
        plugins: { 
          legend: { display: false },
          tooltip: {
            enabled: true, backgroundColor: 'rgba(20, 20, 20, 0.98)',
            bodyFont: { size: 24, weight: 'bold' }, padding: 14, displayColors: false,
            callbacks: {
              label: (c) => {
                const prev = c.dataIndex > 0 ? c.dataset.data[c.dataIndex-1] : null;
                return (prev && c.raw > prev) ? `★ ${c.raw.toLocaleString()} lbs` : `${c.raw.toLocaleString()} lbs`;
              },
              labelTextColor: (c) => (c.dataIndex > 0 && c.raw > c.dataset.data[c.dataIndex-1]) ? '#FFD700' : '#00FF9C'
            }
          }
        },
        scales: { x: { display: false }, y: { display: false, grace: '30%' } }
      }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value, r = document.getElementById(`r-${i}`).value;
    btn.disabled = true; btn.innerText = "Saving...";
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ exercise: name, weight: w, reps: r }) }).then(() => loadData());
  }

  function finishWorkout() {
    if(!confirm("Switch Workout Day?")) return;
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "finishWorkout" }) }).then(() => location.reload());
  }

  loadData();
</script>
</body>
</html>

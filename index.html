<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
    .header { padding: 20px; text-align: center; font-size: 20px; color: #00FF9C; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 10; }
    .container { padding: 15px; max-width: 500px; margin: auto; }
    #timer-overlay { display: none; position: fixed; top: 0; width: 100%; background: #00FF9C; color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 100; }
    .card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
    .small { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
    .val { color: #00FF9C; font-weight: bold; }
    .input-row { display: flex; gap: 10px; margin-top: 10px; }
    input { flex: 1; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 16px; text-align: center; }
    button { width: 100%; padding: 14px; background: #00FF9C; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    button:disabled { background: #222; color: #555; }
    .finish-btn { background: #333; color: #fff; margin-top: 30px; }
    canvas { height: 80px !important; margin: 10px 0; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-overlay">REST: <span id="timer-count">90</span>s</div>
<div class="header" id="dayTitle">Loading...</div>

<div class="container">
  <div id="app"></div>
  <button class="finish-btn" id="fBtn" onclick="finishWorkout()">Finish Workout & Switch Day</button>
</div>

<script>
  let userKey = localStorage.getItem("workout_key") || prompt("Enter Secret Key:");
  if (userKey) localStorage.setItem("workout_key", userKey);

  // Use your actual Web App URL here
  const scriptURL = `https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec?key=${userKey}`;

  function loadData() {
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("dayTitle").innerText = data.day;
        render(data.next);
      });
  }

  function render(list) {
    const app = document.getElementById("app");
    app.innerHTML = "";
    list.forEach((ex, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between">
          <h3 style="margin:0">${ex.name}</h3>
          <div style="text-align:right"><div class="small">Goal</div><div class="val">${ex.targetReps}-${ex.repMax}</div></div>
        </div>
        <canvas id="c-${i}"></canvas>
        <div style="display:flex; justify-content:space-between">
          <div><div class="small">Suggested</div><div class="val">${ex.weight} lbs</div></div>
          <div style="text-align:right"><div class="small">Sets</div><div class="val">${ex.setsDone}/3</div></div>
        </div>
        ${ex.setsDone < 3 ? `
          <div class="input-row">
            <input type="number" id="w-${i}" value="${ex.weight}">
            <input type="number" id="r-${i}" value="${ex.reps}">
          </div>
          <button onclick="logSet('${ex.name.replace(/'/g, "\\'")}', ${i}, this)">Log Set</button>
        ` : `<button disabled>✓ Done</button>`}
      `;
      app.appendChild(card);
      if (ex.history.length) buildChart(`c-${i}`, ex.history);
    });
  }

  function buildChart(id, history) {
    new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: history.map(h => h.d),
        datasets: [{ 
          data: history.map(h => h.v), 
          borderColor: '#00FF9C', 
          tension: 0.4, 
          fill: true, 
          backgroundColor: 'rgba(0,255,156,0.1)', 
          pointRadius: 2 
        }]
      },
      options: { 
        plugins: { 
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (context) => `Total Volume: ${context.raw.toLocaleString()} lbs`
            }
          }
        }, 
        scales: { x: { display: false }, y: { display: false } } 
      }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value;
    const r = document.getElementById(`r-${i}`).value;
    btn.disabled = true;
    
    // Start Rest Timer
    let s = 90;
    document.getElementById("timer-overlay").style.display = "block";
    const t = setInterval(() => {
      s--; document.getElementById("timer-count").innerText = s;
      if(s<=0) { clearInterval(t); document.getElementById("timer-overlay").style.display="none"; alert("Rest Over!"); }
    }, 1000);

    fetch(scriptURL, { 
      method: "POST", 
      body: JSON.stringify({ exercise: name, weight: w, reps: r }) 
    }).then(() => loadData());
  }

  function finishWorkout() {
    if(!confirm("Done for today? This will switch to your next day.")) return;
    const btn = document.getElementById("fBtn");
    btn.innerText = "Switching...";
    btn.disabled = true;

    fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "finishWorkout" }) })
      .then(() => location.reload());
  }

  loadData();
</script>
</body>
</html>

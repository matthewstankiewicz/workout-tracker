<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00FF9C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>StrongTracker</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 50px; }
    .header { padding: 20px; text-align: center; font-size: 24px; color: #00FF9C; border-bottom: 1px solid #222; position: sticky; top: 0; background: #000; z-index: 10; }
    .container { padding: 15px; max-width: 500px; margin: auto; }
    .card { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
    .card h3 { margin: 0 0 5px 0; color: #fff; }
    .stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
    .small { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .val { color: #00FF9C; font-weight: bold; }
    input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 14px; background: #00FF9C; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #222; color: #555; }
    .loading { text-align: center; padding: 40px; color: #00FF9C; }
    /* Rest Timer Bar */
#timer-overlay {
  display: none; /* Hidden by default */
  position: fixed;
  top: 0; left: 0; width: 100%;
  background: #00FF9C; 
  color: #000;
  text-align: center; 
  padding: 12px;
  font-weight: bold; 
  font-size: 18px;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: all 0.3s ease;
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="timer-overlay">RESTING: <span id="timer-count">90</span>s</div>
<div class="header" id="dayTitle">Loading...</div>
<div class="container" id="app">
  <div class="loading">Fetching your workout...</div>
</div>

<script>
  // 1. Setup Security & URL
  let userKey = localStorage.getItem("workout_key");
  if (!userKey) {
      userKey = prompt("Enter your Secret Key:");
      if (userKey) localStorage.setItem("workout_key", userKey);
  }
  
  // REPLACE with your actual Google Exec URL
  const baseAddr = "https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec";
  const scriptURL = `${baseAddr}?key=${userKey}`;

  function loadData() {
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
           document.getElementById("app").innerHTML = `<button onclick="localStorage.removeItem('workout_key'); location.reload();">Invalid Key: Click to Reset</button>`;
           return;
        }
        document.getElementById("dayTitle").innerText = "Workout " + data.day;
        render(data.next);
      })
      .catch(err => console.error("Error:", err));
  }

function render(list) {
  const app = document.getElementById("app");
  app.innerHTML = "";
  
  list.forEach((ex, index) => {
    const isDone = ex.setsDone >= 3;
    const card = document.createElement("div");
    card.className = "card";
    
    // 1. Create the Card Structure
    card.innerHTML = `
      <div style="display: flex; justify-content: space-between;">
        <h3 style="margin:0">${ex.name}</h3>
        <div style="text-align:right">
          <div class="small">Goal Range</div>
          <div class="val">${ex.targetReps} - ${ex.repMax} Reps</div>
        </div>
      </div>
      
      <div style="height: 80px; margin: 10px 0;">
        <canvas id="chart-${index}"></canvas>
      </div>
      
      <div class="small">Suggested: <span class="val">${ex.weight} lbs</span></div>
      <div class="small">Progress: <span class="val">${ex.setsDone} / 3 Sets</span></div>

      ${!isDone ? `
        <div style="display:flex; gap:10px; margin-top:10px;">
          <input type="number" id="w-${ex.name}" value="${ex.weight}" style="flex:1">
          <input type="number" id="r-${ex.name}" value="${ex.reps}" style="flex:1">
        </div>
        <button onclick="logSet('${ex.name.replace(/'/g, "\\'")}')">Log Set</button>
      ` : `<button disabled style="background:#222; color:#00FF9C; margin-top:10px;">✓ Done</button>`}
    `;
    app.appendChild(card);

    // 2. Initialize the Chart for this specific card
    const ctx = document.getElementById(`chart-${index}`).getContext('2d');
    if (ex.history && ex.history.length > 0) {
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ex.history.map(h => h.d),
          datasets: [{
            label: 'Reps',
            data: ex.history.map(h => h.v), // This is the Weight/1RM
            reps: ex.history.map(h => h.r || ""), // We'll pass reps here
            borderColor: '#00FF9C',
            backgroundColor: 'rgba(0, 255, 156, 0.1)',
            fill: true,
            tension: 0.4,
            pointRadius: 4, // Bigger points to show they are interactable
            pointBackgroundColor: '#00FF9C'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { display: false },
            tooltip: {
              enabled: true,
              callbacks: {
                label: function(context) {
                  // This shows "155 lbs (10 reps)" when you tap a point
                  let label = context.raw + ' lbs';
                  if (ex.history[context.dataIndex].r) {
                    label += ' (' + ex.history[context.dataIndex].r + ' reps)';
                  }
                  return label;
                }
              }
            }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          }
        }
      });
    }
  });
}
  function logSet(name) {
  const w = document.getElementById(`w-${name}`).value;
  const r = document.getElementById(`r-${name}`).value;
  const btn = event.target;
  
  // 1. UI Feedback: Disable button immediately
  btn.disabled = true;
  btn.innerText = "Saving...";

  // 2. Start the 90s Timer
  let seconds = 60;
  const overlay = document.getElementById("timer-overlay");
  const display = document.getElementById("timer-count");
  
  overlay.style.display = "block"; // Show the green bar
  
  const interval = setInterval(() => {
    seconds--;
    display.innerText = seconds;
    
    if (seconds <= 0) {
      clearInterval(interval);
      overlay.style.display = "none"; // Hide bar when done
      // Optional: Add a subtle vibrate or sound here
      alert("Rest over! Get back to it!"); 
    }
  }, 1000);

  // 3. Send data to Google Sheets
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ exercise: name, weight: w, reps: r, sets: 1 }),
    redirect: "follow"
  }).then(() => {
    loadData(); // Refresh the card (Progress 1/3, etc.)
  });
}

  loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker Pro</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      background: #000; 
      color: #fff; 
      font-family: -apple-system, sans-serif; 
      margin: 0; 
      overflow-x: hidden;
    }
    
    /* Sticky Header & Navigation */
    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
    }

    .header-main {
      padding: 15px;
      text-align: center;
      font-size: 14px;
      color: #00FF9C;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Session Bar Styling */
    .summary-bar { 
      padding: 12px 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    
    /* Hamburger Menu */
    .menu-btn {
      background: none;
      border: none;
      color: #00FF9C;
      font-size: 24px;
      padding: 0 10px;
      cursor: pointer;
    }

    .menu-content {
      display: none;
      position: absolute;
      right: 15px;
      top: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .menu-item {
      padding: 15px 20px;
      color: #fff;
      white-space: nowrap;
      border-bottom: 1px solid #222;
    }
    .menu-item:last-child { border: 0; }
    .menu-item:active { background: #222; }

    /* Carousel Logic */
    .carousel-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      margin-top: 120px; /* Space for sticky header */
      height: calc(100vh - 120px);
    }

    .carousel-container::-webkit-scrollbar { display: none; }

    .card-wrapper {
      min-width: 100vw;
      scroll-snap-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .card { 
      background: #111; 
      padding: 20px; 
      border-radius: 20px; 
      border: 1px solid #222;
      flex-grow: 1;
    }

    /* Shared UI elements */
    #timer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; background: #00FF9C; color: #000; text-align: center; padding: 12px; font-weight: bold; font-size: 18px; z-index: 2000; }
    .small { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
    .val { color: #00FF9C; font-weight: bold; font-size: 16px; }
    canvas { width: 100% !important; height: 160px !important; margin: 15px 0; touch-action: manipulation; }
    .input-row { display: flex; gap: 12px; margin-top: 15px; }
    input { flex: 1; min-width: 0; padding: 15px; background: #222; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 20px; text-align: center; outline: none; }
    
    .log-btn { 
      width: 100%; padding: 18px; background: #00FF9C; border: none; border-radius: 12px; 
      font-weight: bold; font-size: 16px; margin-top: 15px; color: #000; 
    }
    .log-btn:disabled { background: #222; color: #555; }

    /* Swipe Indicator dots */
    .dots { display: flex; justify-content: center; gap: 8px; margin-top: 10px; padding-bottom: 20px; }
    .dot { width: 8px; height: 8px; background: #333; border-radius: 50%; }
    .dot.active { background: #00FF9C; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-overlay">RESTING: <span id="timer-count">10</span>s</div>

<div class="top-nav">
  <div class="header-main" id="dayTitle">Loading...</div>
  <div class="summary-bar">
    <div>
      <div class="small">Session Volume</div>
      <div class="val" id="totalVol" style="font-size: 20px;">0 lbs</div>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
      <div style="text-align: right;">
        <div class="small">Progress</div>
        <div class="val" id="totalDone">0 / 0</div>
      </div>
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
  </div>
  <div class="menu-content" id="navMenu">
    <div class="menu-item" onclick="finishWorkout()">Finish Workout & Switch Day</div>
    <div class="menu-item" onclick="location.reload()">Refresh App</div>
  </div>
</div>

<div class="carousel-container" id="app"></div>
<div class="dots" id="dots"></div>

<script>
  let userKey = localStorage.getItem("workout_key") || prompt("Enter Secret Key:");
  if (userKey) localStorage.setItem("workout_key", userKey);

  const scriptURL = `https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec?key=${userKey}`;

  function toggleMenu() {
    const m = document.getElementById("navMenu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  // Close menu if clicked outside
  window.onclick = (e) => { if (!e.target.matches('.menu-btn')) document.getElementById("navMenu").style.display = "none"; }

  function loadData() {
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("dayTitle").innerText = data.day;
        render(data.next);
      });
  }

  function render(list) {
    const app = document.getElementById("app");
    const dotsContainer = document.getElementById("dots");
    app.innerHTML = "";
    dotsContainer.innerHTML = "";
    
    let sessionVol = 0;
    let completedCount = 0;
    const todayLabel = new Date().toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });

    list.forEach((ex, i) => {
      // Logic for session volume
      if (ex.history?.length > 0) {
        const last = ex.history[ex.history.length - 1];
        if (last.d === todayLabel) sessionVol += (Number(last.v) || 0);
      }
      if (ex.setsDone >= 3) completedCount++;

      // Create Card
      const wrapper = document.createElement("div");
      wrapper.className = "card-wrapper";
      wrapper.innerHTML = `
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <h3 style="font-size: 22px; margin:0;">${ex.name}</h3>
            <div style="text-align: right;"><div class="small">Goal</div><div class="val">${ex.targetReps}-${ex.repMax}</div></div>
          </div>
          <canvas id="chart-${i}"></canvas>
          <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <div><div class="small">Suggested Weight</div><div class="val" style="font-size: 22px;">${ex.weight} lbs</div></div>
            <div style="text-align: right;"><div class="small">Sets Done</div><div class="val" style="font-size: 22px;">${ex.setsDone} / 3</div></div>
          </div>
          ${ex.setsDone < 3 ? `
            <div class="input-row">
              <input type="number" id="w-${i}" value="${ex.weight}">
              <input type="number" id="r-${i}" value="${ex.reps}">
            </div>
            <button class="log-btn" onclick="logSet('${ex.name.replace(/'/g, "\\'")}', ${i}, this)">Log Set</button>
          ` : `<button class="log-btn" disabled>✓ Exercise Complete</button>`}
        </div>
      `;
      app.appendChild(wrapper);

      // Create Dot
      const dot = document.createElement("div");
      dot.className = "dot" + (i === 0 ? " active" : "");
      dotsContainer.appendChild(dot);

      if (ex.history?.length > 0) buildChart(`chart-${i}`, ex.history);
    });

    document.getElementById("totalVol").innerText = sessionVol.toLocaleString() + " lbs";
    document.getElementById("totalDone").innerText = `${completedCount} / ${list.length}`;
    
    // Track scroll for dots
    app.onscroll = () => {
      const scrollPos = app.scrollLeft;
      const width = window.innerWidth;
      const activeIdx = Math.round(scrollPos / width);
      document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === activeIdx));
    };
  }

  function buildChart(id, history) {
    new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: history.map(h => h.d),
        datasets: [{ 
          data: history.map(h => h.v), 
          borderColor: '#00FF9C', backgroundColor: 'rgba(0, 255, 156, 0.1)',
          fill: true, tension: 0.4, pointRadius: 6, pointBackgroundColor: '#00FF9C', pointHitRadius: 40
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 35 } },
        interaction: { mode: 'index', intersect: false },
        plugins: { 
          legend: { display: false }, 
          tooltip: { 
            enabled: true, backgroundColor: 'rgba(20, 20, 20, 0.95)',
            bodyFont: { size: 22, weight: 'bold' }, padding: 12, displayColors: false,
            callbacks: {
              labelTextColor: (c) => (c.dataIndex > 0 && c.raw > c.dataset.data[c.dataIndex-1]) ? '#FFD700' : '#00FF9C',
              label: (c) => {
                const prev = c.dataIndex > 0 ? c.dataset.data[c.dataIndex-1] : null;
                return (prev && c.raw > prev) ? `★ ${c.raw.toLocaleString()} lbs (PR)` : `${c.raw.toLocaleString()} lbs`;
              }
            } 
          } 
        },
        scales: { x: { display: false }, y: { display: false, grace: '25%' } }
      }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value;
    const r = document.getElementById(`r-${i}`).value;
    btn.disabled = true; btn.innerText = "Saving...";
    startTimer(10);
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ exercise: name, weight: w, reps: r }) }).then(() => loadData());
  }

  function startTimer(seconds) {
    const overlay = document.getElementById("timer-overlay");
    const display = document.getElementById("timer-count");
    overlay.style.display = "block";
    let timeLeft = seconds;
    display.innerText = timeLeft;
    const interval = setInterval(() => {
      timeLeft--; display.innerText = timeLeft;
      if (timeLeft <= 0) { clearInterval(interval); overlay.style.display = "none"; }
    }, 1000);
  }

  function finishWorkout() {
    if(!confirm("Switch Workout Day?")) return;
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "finishWorkout" }) }).then(() => location.reload());
  }
  loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker Pro</title>
  <style>
    :root {
      --bg: #000000;
      --card-bg: #111111;
      --text: #ffffff;
      --sub-text: #888888;
      --border: #222222;
      --accent: #00FF9C;
      --input-bg: #222222;
    }

    [data-theme="light"] {
      --bg: #f2f2f7;
      --card-bg: #ffffff;
      --text: #000000;
      --sub-text: #666666;
      --border: #dddddd;
      --accent: #00bd73;
      --input-bg: #eeeeee;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; 
      margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
      transition: background 0.3s ease;
    }
    
    .top-nav {
      flex: 0 0 auto; z-index: 2000;
      background: var(--bg); opacity: 0.95; backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top);
    }

    .header-main { padding: 10px; text-align: center; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .summary-bar { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .menu-btn { background: none; border: none; color: var(--accent); font-size: 32px; padding: 5px 10px; cursor: pointer; }

    /* Overlay Menus */
    .menu-content, .settings-overlay { 
      display: none; position: fixed; right: 15px; top: 110px; 
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; 
      z-index: 9999; width: 240px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    }
    .settings-overlay { left: 50%; transform: translateX(-50%); top: 20%; width: 90%; max-width: 350px; padding: 20px; }
    
    .menu-item { padding: 18px; color: var(--text); border-bottom: 1px solid var(--border); font-weight: 500; text-align: center; cursor: pointer;}
    .menu-item:last-child { border: none; }

    /* Carousel & Cards */
    .carousel-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .carousel-container::-webkit-scrollbar { display: none; }
    .card-wrapper { min-width: 100vw; height: 100%; scroll-snap-align: center; padding: 15px; display: flex; flex-direction: column; }
    .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); flex: 1; display: flex; flex-direction: column; justify-content: space-between; }

    canvas { width: 100% !important; flex: 1; min-height: 180px; max-height: 250px; margin: 10px 0; }
    input { flex: 1; padding: 15px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 20px; text-align: center; outline: none; }
    .log-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 12px; color: #000; }

    /* Timer Styles */
    #timer-banner { 
      display: none; position: fixed; top: 0; width: 100%; background: var(--accent); 
      color: #000; text-align: center; padding: 10px; z-index: 5000; font-weight: 900; font-size: 18px;
    }

    .dots { flex: 0 0 70px; display: flex; justify-content: center; gap: 8px; padding-top: 15px; background: var(--bg); padding-bottom: env(safe-area-inset-bottom); }
    .dot { width: 6px; height: 6px; background: var(--border); border-radius: 50%; }
    .dot.active { background: var(--accent); transform: scale(1.3); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-banner">REST: <span id="timer-count">0</span>s</div>

<div class="top-nav">
  <div class="header-main" id="dayTitle">Syncing...</div>
  <div class="summary-bar">
    <div><div class="small">Session Volume</div><div id="totalVol" class="val" style="font-size: 20px;">0 lbs</div></div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="text-align: right;"><div class="small">Progress</div><div id="totalDone" class="val">0 / 0</div></div>
      <button class="menu-btn" onclick="toggleMenu('navMenu')">☰</button>
    </div>
  </div>
</div>

<div class="menu-content" id="navMenu">
  <div class="menu-item" onclick="toggleMenu('settingsPanel')">⚙️ Settings</div>
  <div class="menu-item" onclick="handleMenuAction(toggleTheme)">🌓 Toggle Theme</div>
  <div class="menu-item" onclick="handleMenuAction(finishWorkout)">🏁 Finish & Switch</div>
  <div class="menu-item" onclick="handleMenuAction(() => loadData(true))">🔄 Refresh Data</div>
</div>

<div class="settings-overlay" id="settingsPanel">
  <h3 style="margin-top:0;">Settings</h3>
  <label class="small">Rest Timer (Seconds)</label>
  <div style="display:flex; gap:10px; margin: 10px 0 20px 0;">
    <input type="number" id="restInput" value="90" style="font-size: 24px;">
  </div>
  <button class="log-btn" onclick="saveSettings()">Save & Close</button>
</div>

<div class="carousel-container" id="app"></div>
<div class="dots" id="dots"></div>

<script>
  let restTime = localStorage.getItem('rest_timer') || 90;
  let timerInterval;

  function initTheme() {
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('restInput').value = restTime;
  }

  function toggleMenu(id) {
    const menus = ['navMenu', 'settingsPanel'];
    menus.forEach(mId => {
      const el = document.getElementById(mId);
      el.style.display = (mId === id && el.style.display !== "block") ? "block" : "none";
    });
  }

  function handleMenuAction(actionFn) {
    toggleMenu();
    actionFn();
  }

  function saveSettings() {
    restTime = document.getElementById('restInput').value;
    localStorage.setItem('rest_timer', restTime);
    toggleMenu();
  }

  function startTimer() {
    clearInterval(timerInterval);
    const banner = document.getElementById('timer-banner');
    const display = document.getElementById('timer-count');
    let timeLeft = restTime;
    
    banner.style.display = 'block';
    display.innerText = timeLeft;

    timerInterval = setInterval(() => {
      timeLeft--;
      display.innerText = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        banner.style.background = '#ff4444';
        display.innerText = "READY!";
        setTimeout(() => { 
          banner.style.display = 'none'; 
          banner.style.background = 'var(--accent)'; 
        }, 5000);
      }
    }, 1000);
  }

  // --- Logic for Sheets & Rendering ---
  let userKey = localStorage.getItem("workout_key") || prompt("Enter Secret Key:");
  if (userKey) localStorage.setItem("workout_key", userKey);
  const scriptURL = `https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec?key=${userKey}`;

  function loadData(isManual = false) {
    const app = document.getElementById("app");
    const currentIndex = Math.round(app.scrollLeft / window.innerWidth);
    fetch(scriptURL, { redirect: "follow" }).then(res => res.json()).then(data => {
      document.getElementById("dayTitle").innerText = data.day || "Workout";
      render(data.next || [], currentIndex);
    });
  }

  function render(list, savedIndex = 0) {
    const app = document.getElementById("app");
    const dotsContainer = document.getElementById("dots");
    app.innerHTML = ""; dotsContainer.innerHTML = "";
    let vol = 0; let done = 0;
    const today = new Date().toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });

    list.forEach((ex, i) => {
      if (ex.history?.length > 0 && ex.history[ex.history.length-1].d === today) vol += Number(ex.history[ex.history.length-1].v || 0);
      if (ex.setsDone >= 3) done++;
      const wrapper = document.createElement("div");
      wrapper.className = "card-wrapper";
      wrapper.innerHTML = `
        <div class="card">
          <div style="display:flex; justify-content:space-between;">
            <h3 style="margin:0; font-size:22px;">${ex.name}</h3>
            <div style="text-align:right;"><div class="small">Goal</div><div class="val">${ex.targetReps}-${ex.repMax}</div></div>
          </div>
          <canvas id="chart-${i}"></canvas>
          <div>
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <div><div class="small">Weight</div><div class="val">${ex.weight} lbs</div></div>
              <div style="text-align:right;"><div class="small">Sets</div><div class="val">${ex.setsDone} / 3</div></div>
            </div>
            ${ex.setsDone < 3 ? `
              <div style="display:flex; gap:10px;"><input type="number" id="w-${i}" value="${ex.weight}"><input type="number" id="r-${i}" value="${ex.reps}"></div>
              <button class="log-btn" onclick="logSet('${ex.name.replace(/'/g, "\\'")}', ${i}, this)">Log Set</button>
            ` : `<button class="log-btn" disabled style="background:var(--input-bg); color:var(--accent);">✓ Complete</button>`}
          </div>
        </div>`;
      app.appendChild(wrapper);
      const d = document.createElement("div"); d.className = "dot"+(i===0?" active":""); dotsContainer.appendChild(d);
      if (ex.history?.length > 0) buildChart(`chart-${i}`, ex.history);
    });
    document.getElementById("totalVol").innerText = vol.toLocaleString() + " lbs";
    document.getElementById("totalDone").innerText = `${done} / ${list.length}`;
    if (savedIndex > 0) requestAnimationFrame(() => app.scrollTo({ left: savedIndex * window.innerWidth }));
    app.onscroll = () => {
      const idx = Math.round(app.scrollLeft / window.innerWidth);
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    };
  }

  function buildChart(id, history) {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: history.map(h => h.d),
        datasets: [{ data: history.map(h => h.v), borderColor: isLight ? '#00bd73' : '#00FF9C', fill: true, tension: 0.4 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value, r = document.getElementById(`r-${i}`).value;
    btn.disabled = true; btn.innerText = "Saving...";
    startTimer();
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ exercise: name, weight: w, reps: r }) }).then(() => loadData());
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    loadData();
  }

  function finishWorkout() {
    if(confirm("Switch Workout Day?")) fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "finishWorkout" }) }).then(() => location.reload());
  }

  initTheme();
  loadData();
</script>
</body>
</html>

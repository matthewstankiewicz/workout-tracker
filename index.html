<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker Pro</title>
  <style>
    * { box-sizing: border-box; }
    
    body { 
      background: #000; 
      color: #fff; 
      font-family: -apple-system, sans-serif; 
      margin: 0; 
      overflow: hidden; 
    }
    
    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      padding-top: env(safe-area-inset-top); /* Supports notched phones */
    }

    .header-main { padding: 10px; text-align: center; font-size: 13px; color: #00FF9C; text-transform: uppercase; letter-spacing: 1px; }
    .summary-bar { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .menu-btn { background: none; border: none; color: #00FF9C; font-size: 24px; padding: 0 10px; }

    .carousel-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      margin-top: 110px; 
      /* FIX: Use a more conservative height to prevent cutoff */
      height: calc(100vh - 110px - 70px); 
    }

    .carousel-container::-webkit-scrollbar { display: none; }

    .card-wrapper {
      min-width: 100vw;
      scroll-snap-align: center;
      padding: 10px 15px; 
      display: flex;
      flex-direction: column;
    }

    .card { 
      background: #111; 
      padding: 15px; 
      border-radius: 20px; 
      border: 1px solid #222;
      height: 100%; /* Fill the wrapper */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    canvas { 
      width: 100% !important; 
      flex-grow: 1; /* Let the chart take available space */
      max-height: 220px;
      margin: 10px 0; 
      touch-action: manipulation; 
    }

    .input-row { display: flex; gap: 10px; margin-top: 10px; }
    input { 
      flex: 1; min-width: 0; padding: 12px; background: #222; border: 1px solid #333; 
      color: #fff; border-radius: 12px; font-size: 18px; text-align: center; outline: none; 
    }
    
    .log-btn { 
      width: 100%; padding: 15px; background: #00FF9C; border: none; border-radius: 12px; 
      font-weight: bold; font-size: 16px; margin-top: 12px; color: #000;
    }

    .dots { 
      display: flex; justify-content: center; gap: 8px; height: 60px; 
      padding-top: 10px; background: #000; position: fixed; bottom: 0; width: 100%; 
      padding-bottom: env(safe-area-inset-bottom);
    }
    .dot { width: 6px; height: 6px; background: #333; border-radius: 50%; }
    .dot.active { background: #00FF9C; }

    /* Fix for "Syncing" header showing during load */
    [v-cloak] { display: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-overlay" style="display:none; position:fixed; top:0; width:100%; background:#00FF9C; color:#000; text-align:center; padding:10px; z-index:2000; font-weight:bold;">REST: <span id="timer-count">10</span>s</div>

<div class="top-nav">
  <div class="header-main" id="dayTitle">Syncing...</div>
  <div class="summary-bar">
    <div><div class="small">Volume</div><div id="totalVol" class="val" style="font-size:18px;">0 lbs</div></div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="text-align:right;"><div class="small">Done</div><div id="totalDone" class="val">0 / 0</div></div>
      <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
  </div>
</div>

<div class="carousel-container" id="app"></div>
<div class="dots" id="dots"></div>

<script>
  // ... (Keep existing userKey and scriptURL logic here) ...
  let userKey = localStorage.getItem("workout_key") || prompt("Enter Secret Key:");
  if (userKey) localStorage.setItem("workout_key", userKey);
  const scriptURL = `https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec?key=${userKey}`;

  function loadData() {
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("dayTitle").innerText = data.day;
        render(data.next);
      });
  }

  function render(list) {
    const app = document.getElementById("app");
    const dotsContainer = document.getElementById("dots");
    app.innerHTML = ""; dotsContainer.innerHTML = "";
    
    let vol = 0; let done = 0;
    const today = new Date().toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });

    list.forEach((ex, i) => {
      if (ex.history?.length > 0 && ex.history[ex.history.length-1].d === today) vol += Number(ex.history[ex.history.length-1].v || 0);
      if (ex.setsDone >= 3) done++;

      const wrapper = document.createElement("div");
      wrapper.className = "card-wrapper";
      wrapper.innerHTML = `
        <div class="card">
          <div style="display:flex; justify-content:space-between;">
            <h3 style="margin:0; font-size:20px;">${ex.name}</h3>
            <div style="text-align:right;"><div class="small">Goal</div><div class="val" style="color:#00FF9C;">${ex.targetReps}-${ex.repMax}</div></div>
          </div>
          <canvas id="chart-${i}"></canvas>
          <div>
            <div style="display:flex; justify-content:space-between;">
              <div><div class="small">Next</div><div class="val">${ex.weight} lbs</div></div>
              <div style="text-align:right;"><div class="small">Sets</div><div class="val">${ex.setsDone} / 3</div></div>
            </div>
            ${ex.setsDone < 3 ? `
              <div class="input-row"><input type="number" id="w-${i}" value="${ex.weight}"><input type="number" id="r-${i}" value="${ex.reps}"></div>
              <button class="log-btn" onclick="logSet('${ex.name.replace(/'/g, "\\'")}', ${i}, this)">Log Set</button>
            ` : `<button class="log-btn" disabled style="background:#222; color:#555;">✓ Complete</button>`}
          </div>
        </div>`;
      app.appendChild(wrapper);
      const d = document.createElement("div"); d.className = "dot"+(i===0?" active":""); dotsContainer.appendChild(d);
      if (ex.history?.length > 0) buildChart(`chart-${i}`, ex.history);
    });
    document.getElementById("totalVol").innerText = vol.toLocaleString() + " lbs";
    document.getElementById("totalDone").innerText = `${done} / ${list.length}`;
    app.onscroll = () => {
      const idx = Math.round(app.scrollLeft / window.innerWidth);
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
    };
  }

  function buildChart(id, history) {
    new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: history.map(h => h.d),
        datasets: [{ data: history.map(h => h.v), borderColor: '#00FF9C', backgroundColor: 'rgba(0, 255, 156, 0.1)', fill: true, tension: 0.4, pointRadius: 5 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        devicePixelRatio: 2,
        layout: { padding: { top: 35 } },
        plugins: { 
          legend: { display: false },
          tooltip: {
            enabled: true, backgroundColor: 'rgba(20, 20, 20, 0.98)',
            bodyFont: { size: 22, weight: 'bold' }, padding: 12, displayColors: false,
            callbacks: {
              label: (c) => {
                const prev = c.dataIndex > 0 ? c.dataset.data[c.dataIndex-1] : null;
                return (prev && c.raw > prev) ? `★ ${c.raw.toLocaleString()} lbs` : `${c.raw.toLocaleString()} lbs`;
              },
              labelTextColor: (c) => (c.dataIndex > 0 && c.raw > c.dataset.data[c.dataIndex-1]) ? '#FFD700' : '#00FF9C'
            }
          }
        },
        scales: { x: { display: false }, y: { display: false, grace: '25%' } }
      }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value, r = document.getElementById(`r-${i}`).value;
    btn.disabled = true; btn.innerText = "Saving...";
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ exercise: name, weight: w, reps: r }) }).then(() => loadData());
  }
  
  function toggleMenu() { /* Keep existing menu logic */ }
  function finishWorkout() { /* Keep existing logic */ }

  loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00FF9C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>StrongTracker Pro</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 80px; }
    .header { padding: 20px; text-align: center; font-size: 22px; color: #00FF9C; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(10px); }
    .container { padding: 15px; max-width: 500px; margin: auto; }
    
    /* Timer Overlay */
    #timer-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; background: #00FF9C; color: #000; text-align: center; padding: 12px; font-weight: bold; font-size: 18px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

    .card { background: #111; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #222; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .card h3 { margin: 0; font-size: 18px; color: #fff; flex: 1; }
    .small { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .val { color: #00FF9C; font-weight: bold; }
    
    .chart-container { height: 100px; margin: 15px 0; position: relative; }
    
    .input-group { display: flex; gap: 10px; margin-top: 15px; }
    input { flex: 1; padding: 14px; background: #222; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 18px; text-align: center; outline: none; }
    input:focus { border-color: #00FF9C; }
    
    button { width: 100%; padding: 16px; background: #00FF9C; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 12px; transition: opacity 0.2s; }
    button:active { opacity: 0.7; }
    button:disabled { background: #222; color: #555; cursor: not-allowed; }
    
    #finish-btn { background: #333; color: #fff; border: 1px solid #444; margin-top: 40px; }
    .loading { text-align: center; padding: 50px; color: #00FF9C; font-weight: bold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-overlay">RESTING: <span id="timer-count">90</span>s</div>
<div class="header" id="dayTitle">StrongTracker</div>

<div class="container">
  <div id="app">
    <div class="loading">Loading Workout...</div>
  </div>
  <button id="finish-btn" onclick="finishWorkout()">Finish Workout & Switch Day</button>
</div>

<script>
  let userKey = localStorage.getItem("workout_key");
  if (!userKey) {
      userKey = prompt("Enter Secret Key:");
      if (userKey) localStorage.setItem("workout_key", userKey);
  }

  // REPLACE THIS with your actual Google Script Web App URL
  const baseAddr = "https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec";
  const scriptURL = `${baseAddr}?key=${userKey}`;

  function loadData() {
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
            document.getElementById("app").innerHTML = `<button onclick="localStorage.removeItem('workout_key'); location.reload();">Invalid Key: Tap to Reset</button>`;
            return;
        }
        document.getElementById("dayTitle").innerText = "Workout Day " + data.day;
        render(data.next);
      })
      .catch(err => console.error("Error:", err));
  }

  function render(list) {
    const app = document.getElementById("app");
    app.innerHTML = "";
    
    list.forEach((ex, index) => {
      const isDone = ex.setsDone >= 3;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h3>${ex.name}</h3>
          <div style="text-align: right;">
            <div class="small">Goal Range</div>
            <div class="val" style="font-size: 14px;">${ex.targetReps} - ${ex.repMax} Reps</div>
          </div>
        </div>

        <div class="chart-container">
          <canvas id="chart-${index}"></canvas>
        </div>

        <div style="display: flex; justify-content: space-between;">
          <div>
            <div class="small">Suggested Weight</div>
            <div class="val">${ex.weight} lbs</div>
          </div>
          <div style="text-align: right;">
            <div class="small">Sets Done</div>
            <div class="val">${ex.setsDone} / 3</div>
          </div>
        </div>

        ${!isDone ? `
          <div class="input-group">
            <input type="number" id="w-${ex.name}" value="${ex.weight}" placeholder="Lbs">
            <input type="number" id="r-${ex.name}" value="${ex.reps}" placeholder="Reps">
          </div>
          <button onclick="logSet('${ex.name.replace(/'/g, "\\'")}', this)">Log Set</button>
        ` : `<button disabled style="margin-top:20px;">✓ Exercise Completed</button>`}
      `;
      app.appendChild(card);

      // Initialize Chart
      if (ex.history && ex.history.length > 0) {
        new Chart(document.getElementById(`chart-${index}`), {
          type: 'line',
          data: {
            labels: ex.history.map(h => h.d),
            datasets: [{
              data: ex.history.map(h => h.v),
              borderColor: '#00FF9C',
              backgroundColor: 'rgba(0, 255, 156, 0.1)',
              fill: true,
              tension: 0.4,
              pointRadius: 3,
              pointBackgroundColor: '#00FF9C'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
              legend: { display: false },
              tooltip: {
                callbacks: { label: (ctx) => `Avg Intensity: ${ctx.raw} lbs` }
              }
            },
            scales: { x: { display: false }, y: { display: false } }
          }
        });
      }
    });
  }

  function logSet(name, btn) {
    const w = document.getElementById(`w-${name}`).value;
    const r = document.getElementById(`r-${name}`).value;
    
    btn.disabled = true;
    btn.innerText = "Saving...";

    // Start 90s Timer
    startTimer(90);

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ exercise: name, weight: w, reps: r }),
      redirect: "follow"
    }).then(() => loadData());
  }

  function startTimer(seconds) {
    const overlay = document.getElementById("timer-overlay");
    const display = document.getElementById("timer-count");
    overlay.style.display = "block";
    
    let timeLeft = seconds;
    const interval = setInterval(() => {
      timeLeft--;
      display.innerText = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(interval);
        overlay.style.display = "none";
        alert("Rest Over!");
      }
    }, 1000);
  }

  function finishWorkout() {
    if (!confirm("Finish today's workout and switch to the next day?")) return;
    const btn = document.getElementById("finish-btn");
    btn.disabled = true;
    btn.innerText = "Switching Days...";

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({ action: "finishWorkout" }),
      redirect: "follow"
    }).then(() => location.reload());
  }

  loadData();
</script>
</body>
</html>

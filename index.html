<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker Pro</title>
  <style>
    :root {
      --bg: #000000; --card-bg: #111111; --text: #ffffff; --sub-text: #888888;
      --border: #222222; --accent: #00FF9C; --input-bg: #222222;
    }
    [data-theme="light"] {
      --bg: #f2f2f7; --card-bg: #ffffff; --text: #000000; --sub-text: #666666;
      --border: #dddddd; --accent: #00bd73; --input-bg: #eeeeee;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .top-nav { flex: 0 0 auto; z-index: 2000; background: var(--bg); opacity: 0.95; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top); }
    .header-main { padding: 10px; text-align: center; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .summary-bar { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .menu-btn { background: none; border: none; color: var(--accent); font-size: 32px; padding: 5px 10px; cursor: pointer; }
    .menu-content, .settings-overlay { display: none; position: fixed; right: 15px; top: 110px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; z-index: 9999; width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .settings-overlay { left: 50%; transform: translateX(-50%); width: 90%; max-width: 320px; padding: 20px; }
    .menu-item { padding: 18px; color: var(--text); border-bottom: 1px solid var(--border); font-weight: 500; text-align: center; cursor: pointer;}
    
    .stats-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10001; padding: 20px; overflow-y: auto; }
    .stats-card { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
    .close-stats { color: var(--accent); font-weight: bold; margin-bottom: 20px; display: block; text-align: right; font-size: 18px; }

    .carousel-container { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
    .carousel-container::-webkit-scrollbar { display: none; }
    .card-wrapper { min-width: 100vw; height: 100%; scroll-snap-align: center; padding: 15px; display: flex; flex-direction: column; }
    .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .prev-session { text-align: center; margin-bottom: 10px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; }
    .prev-data { font-size: 14px; color: var(--text); margin-top: 4px; }
    
    .input-row { display: flex; gap: 10px; width: 100%; max-width: 100%; margin: 0 auto; justify-content: space-between; }
    input { flex: 1; width: 1%; min-width: 0; padding: 15px 0; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 20px; text-align: center; outline: none; -webkit-appearance: none; }
    .log-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; color: #000; }
    
    canvas { width: 100% !important; flex: 1; min-height: 150px; max-height: 200px; }
    .dots { flex: 0 0 60px; display: flex; justify-content: center; gap: 8px; padding-top: 10px; padding-bottom: env(safe-area-inset-bottom); }
    .dot { width: 6px; height: 6px; background: var(--border); border-radius: 50%; }
    .dot.active { background: var(--accent); transform: scale(1.3); }
    .small { font-size: 10px; color: var(--sub-text); text-transform: uppercase; }
    .val { color: var(--accent); font-weight: bold; font-size: 16px; }
    #timer-banner { display: none; position: fixed; top: 0; width: 100%; background: var(--accent); color: #000; text-align: center; padding: 12px; z-index: 10000; font-weight: bold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-banner" onclick="this.style.display='none'">REST: <span id="timer-count">0</span>s</div>

<div class="top-nav">
  <div class="header-main" id="dayTitle">Syncing...</div>
  <div class="summary-bar">
    <div><div class="small">Session Volume</div><div id="totalVol" class="val">0 lbs</div></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="text-align:right;"><div class="small">Progress</div><div id="totalDone" class="val">0 / 0</div></div>
      <button class="menu-btn" onclick="toggleMenu('navMenu')">☰</button>
    </div>
  </div>
</div>

<div class="menu-content" id="navMenu">
  <div class="menu-item" onclick="handleMenuAction(showStats)">📊 View Stats</div>
  <div class="menu-item" onclick="handleMenuAction(toggleTheme)">🌓 Light/Dark</div>
  <div class="menu-item" onclick="handleMenuAction(finishWorkout)">🏁 Finish & Switch</div>
</div>

<div id="statsOverlay" class="stats-overlay">
  <span class="close-stats" onclick="document.getElementById('statsOverlay').style.display='none'">CLOSE [X]</span>
  <div class="stats-card"><h3>Pull Volume</h3><canvas id="chartPull"></canvas></div>
  <div class="stats-card"><h3>Push Volume</h3><canvas id="chartPush"></canvas></div>
  <div class="stats-card"><h3>Legs Volume</h3><canvas id="chartLegs"></canvas></div>
</div>

<div class="carousel-container" id="app"></div>
<div class="dots" id="dots"></div>

<script>
  let globalTotals = [];
  const scriptURL = `YOUR_APPS_SCRIPT_URL_HERE?key=8675309`; // Update this

  function toggleMenu(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
  }

  function handleMenuAction(fn) { document.getElementById('navMenu').style.display = 'none'; fn(); }

  function showStats() {
    document.getElementById('statsOverlay').style.display = 'block';
    renderGlobalChart("Pull", "chartPull", "#00FF9C");
    renderGlobalChart("Push", "chartPush", "#00bd73");
    renderGlobalChart("Legs", "chartLegs", "#3498db");
  }

  function renderGlobalChart(label, canvasId, color) {
    const dataPoints = globalTotals.filter(d => d[label] > 0);
    new Chart(document.getElementById(canvasId), {
      type: 'bar',
      data: { labels: dataPoints.map(d => d.date), datasets: [{ data: dataPoints.map(d => d[label]), backgroundColor: color, borderRadius: 5 }] },
      options: { plugins: { legend: false } }
    });
  }

  function loadData() {
    fetch(scriptURL).then(res => res.json()).then(data => {
      globalTotals = data.totals;
      document.getElementById("dayTitle").innerText = data.day;
      render(data.next);
    });
  }

  function render(list) {
    const app = document.getElementById("app"); app.innerHTML = "";
    const dots = document.getElementById("dots"); dots.innerHTML = "";
    list.forEach((ex, i) => {
      const hist = ex.history || [];
      const prev = hist.length > 0 ? hist[hist.length-1] : { d: "N/A", s: "" };
      const wrapper = document.createElement("div");
      wrapper.className = "card-wrapper";
      wrapper.innerHTML = `
        <div class="card">
          <h3 style="text-align:center">${ex.name}</h3>
          <canvas id="ex-chart-${i}"></canvas>
          <div class="prev-session">
            <div class="small">Last Session (${prev.d})</div>
            <div class="prev-data">${prev.s ? prev.s.split('\n').reverse().join(' | ') : 'No history'}</div>
          </div>
          <div>
            <div class="input-row">
              <input type="number" id="w-${i}" value="${ex.weight}">
              <input type="number" id="r-${i}" placeholder="Reps">
            </div>
            <button class="log-btn" onclick="logSet('${ex.name}', ${i}, this)">Log Set</button>
          </div>
        </div>`;
      app.appendChild(wrapper);
      const dot = document.createElement("div"); dot.className = "dot"+(i===0?" active":""); dots.appendChild(dot);
      if (hist.length) buildExChart(`ex-chart-${i}`, hist);
    });
  }

  function buildExChart(id, history) {
    new Chart(document.getElementById(id), {
      type: 'line',
      data: { labels: history.map(h => h.d), datasets: [{ data: history.map(h => h.v), borderColor: '#00FF9C', fill: true, tension: 0.4 }] },
      options: { plugins: { legend: false }, scales: { x: { display: false }, y: { display: false } } }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value, r = document.getElementById(`r-${i}`).value;
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ exercise: name, weight: w, reps: r }) }).then(() => loadData());
  }

  function finishWorkout() { fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "finishWorkout" }) }).then(() => location.reload()); }
  function toggleTheme() { document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
  loadData();
</script>
</body>
</html>

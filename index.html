<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#00FF9C">
  <title>StrongTracker Pro</title>
  <style>
    * { box-sizing: border-box; } /* The fix for the padding issue */
    
    body { 
      background: #000; 
      color: #fff; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      padding-bottom: 100px; 
      overflow-x: hidden;
    }

    .header { 
      padding: 20px; 
      text-align: center; 
      font-size: 18px; 
      color: #00FF9C; 
      border-bottom: 1px solid #222; 
      position: sticky; 
      top: 0; 
      background: rgba(0,0,0,0.9); 
      z-index: 100; 
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #timer-overlay { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      background: #00FF9C; 
      color: #000; 
      text-align: center; 
      padding: 12px; 
      font-weight: bold; 
      font-size: 18px; 
      z-index: 1000; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
    }

    .container { 
      padding: 15px; 
      max-width: 500px; 
      margin: auto; 
    }

    .card { 
      background: #111; 
      padding: 20px; 
      border-radius: 16px; 
      margin-bottom: 20px; 
      border: 1px solid #222; 
    }

    .card h3 { margin: 0; font-size: 18px; color: #fff; }
    
    .small { 
      font-size: 10px; 
      color: #888; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      margin-bottom: 2px;
    }
    
    .val { color: #00FF9C; font-weight: bold; font-size: 16px; }

    canvas { 
      width: 100% !important; 
      height: 100px !important; 
      margin: 15px 0; 
    }

    .input-row { 
      display: flex; 
      gap: 12px; 
      margin-top: 15px; 
      width: 100%;
    }

    input { 
      flex: 1; 
      min-width: 0; /* Prevents flex items from growing past container */
      padding: 14px; 
      background: #222; 
      border: 1px solid #333; 
      color: #fff; 
      border-radius: 10px; 
      font-size: 18px; 
      text-align: center; 
      outline: none;
      -webkit-appearance: none;
    }

    input:focus { border-color: #00FF9C; }

    button { 
      width: 100%; 
      padding: 16px; 
      background: #00FF9C; 
      border: none; 
      border-radius: 10px; 
      font-weight: bold; 
      font-size: 16px; 
      cursor: pointer; 
      margin-top: 12px; 
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { background: #222; color: #555; cursor: not-allowed; }

    .finish-btn { 
      background: #222; 
      color: #fff; 
      border: 1px solid #444; 
      margin-top: 40px; 
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="timer-overlay">RESTING: <span id="timer-count">90</span>s</div>
<div class="header" id="dayTitle">Workout Tracker</div>

<div class="container">
  <div id="app"></div>
  <button class="finish-btn" id="fBtn" onclick="finishWorkout()">Finish Workout & Switch Day</button>
</div>

<script>
  let userKey = localStorage.getItem("workout_key") || prompt("Enter Secret Key:");
  if (userKey) localStorage.setItem("workout_key", userKey);

  // Replace with your actual deployed Script URL
  const scriptURL = `https://script.google.com/macros/s/AKfycbzGH5Ggeq-Z29hYC3R98GnEJAdEGUrzmTszgX2TuG8ZMGFdgrjtu5Yy028CUPjnaGJobw/exec?key=${userKey}`;

  function loadData() {
    fetch(scriptURL, { redirect: "follow" })
      .then(res => res.json())
      .then(data => {
        document.getElementById("dayTitle").innerText = data.day;
        render(data.next);
      });
  }

  function render(list) {
    const app = document.getElementById("app");
    app.innerHTML = "";
    
    list.forEach((ex, i) => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <h3>${ex.name}</h3>
          <div style="text-align: right;">
            <div class="small">Goal Range</div>
            <div class="val" style="font-size: 14px;">${ex.targetReps}-${ex.repMax} Reps</div>
          </div>
        </div>

        <canvas id="chart-${i}"></canvas>

        <div style="display: flex; justify-content: space-between;">
          <div>
            <div class="small">Suggested</div>
            <div class="val">${ex.weight} lbs</div>
          </div>
          <div style="text-align: right;">
            <div class="small">Sets Done</div>
            <div class="val">${ex.setsDone} / 3</div>
          </div>
        </div>

        ${ex.setsDone < 3 ? `
          <div class="input-row">
            <input type="number" id="w-${i}" value="${ex.weight}" placeholder="Lbs">
            <input type="number" id="r-${i}" value="${ex.reps}" placeholder="Reps">
          </div>
          <button onclick="logSet('${ex.name.replace(/'/g, "\\'")}', ${i}, this)">Log Set</button>
        ` : `<button disabled style="margin-top:20px;">✓ Done</button>`}
      `;
      app.appendChild(card);
      if (ex.history.length > 0) buildChart(`chart-${i}`, ex.history);
    });
  }

  function buildChart(id, history) {
    new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        labels: history.map(h => h.d),
        datasets: [{ 
          data: history.map(h => h.v), 
          borderColor: '#00FF9C', 
          backgroundColor: 'rgba(0, 255, 156, 0.1)',
          fill: true,
          tension: 0.4,
          pointRadius: 2 
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { 
          legend: { display: false },
          tooltip: {
            callbacks: { label: (ctx) => `Volume: ${ctx.raw.toLocaleString()} lbs` }
          }
        },
        scales: { x: { display: false }, y: { display: false } }
      }
    });
  }

  function logSet(name, i, btn) {
    const w = document.getElementById(`w-${i}`).value;
    const r = document.getElementById(`r-${i}`).value;
    btn.disabled = true;
    btn.innerText = "Saving...";

    startTimer(10);

    fetch(scriptURL, { 
      method: "POST", 
      body: JSON.stringify({ exercise: name, weight: w, reps: r }) 
    }).then(() => loadData());
  }

  function startTimer(seconds) {
    const overlay = document.getElementById("timer-overlay");
    const display = document.getElementById("timer-count");
    overlay.style.display = "block";
    let timeLeft = seconds;
    const interval = setInterval(() => {
      timeLeft--;
      display.innerText = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(interval);
        overlay.style.display = "none";
      }
    }, 1000);
  }

  function finishWorkout() {
    if(!confirm("Switch to the next day in your cycle?")) return;
    const btn = document.getElementById("fBtn");
    btn.disabled = true;
    btn.innerText = "Switching...";
    
    fetch(scriptURL, { method: "POST", body: JSON.stringify({ action: "finishWorkout" }) })
      .then(() => location.reload());
  }

  loadData();
</script>
</body>
</html>
